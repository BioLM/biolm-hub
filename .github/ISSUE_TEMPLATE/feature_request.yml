name: Framework / CLI feature request
description: Propose a change to the shared framework (models/commons), the bh CLI, the gateway, docs generation, or CI — not a new model (use "Propose a new model" for that).
title: "[feature]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        For a new *model* to add to the catalog, please use the **"Propose a new model"** template
        instead — this one is for the framework itself (`models/commons/`, `cli/`, `gateway/`,
        `docs/`, CI/CD).

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - "cli/ (the bh CLI)"
        - "gateway/ (unified endpoint / catalog web app)"
        - "models/commons/ (shared framework)"
        - "docs/ (mkdocs site / generated pages)"
        - "CI/CD (.github/workflows)"
        - "tooling/ (repo-quality checks)"
        - "Other"
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What's missing or awkward today? Concrete examples help — a command you wish existed, a schema inconsistency you hit, a CI check that's too slow, etc.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you change? If it touches the uniform layout, schema field names, or the action verb set described in `PHILOSOPHY.md`, say how it stays consistent with those.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about, and why you didn't pick them.
    validations:
      required: false

  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and didn't find a duplicate.
          required: true
        - label: I've read PHILOSOPHY.md and this proposal is consistent with the "uniformity" design center (or I explain above why it should be an exception).
          required: false
