name: CI

# Safe checks that run on EVERY PR (no Modal, no R2, no secrets).
# Model deploy + integration/deployment tests are maintainer-gated in a separate
# workflow so untrusted PRs never trigger expensive Modal jobs.
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: lint · types · unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # change-detection tests diff against HEAD^ (need parent commit)

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Style (ruff + black + hooks)
        run: uv run pre-commit run --all-files --show-diff-on-failure

      - name: Type check (mypy)
        run: uv run mypy . .github/scripts

      - name: Schema docs (field descriptions)
        run: uv run python tooling/check_schema_docs.py

      - name: CI script tests (change detection)
        run: uv run pytest .github/scripts/ -p no:cacheprovider --no-cov -v

      - name: Unit tests
        run: uv run pytest -m "not integration and not deployment and not slow and not e2e and not live_modal" --no-cov -v

  docs:
    name: docs build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv python install 3.12
      - run: uv sync --all-extras
      - run: uv run mkdocs build --strict

  secrets:
    name: secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so gitleaks can scan all commits
      # Use the gitleaks CLI (MIT, free) rather than gitleaks-action@v2, which now
      # requires a paid GITLEAKS_LICENSE for organization repos. Tuned by .gitleaks.toml.
      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION=8.18.4
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" | tar -xz gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks
          gitleaks version
      - name: Run gitleaks
        run: gitleaks detect --source . --config .gitleaks.toml --redact --verbose
