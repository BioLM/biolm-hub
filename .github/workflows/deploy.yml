# Tier 2 of a two-tier gated CI: the maintainer-gated, secret-bearing pipeline.
#
# Tier 1 (ci.yml) — lint/ruff/black, mypy, unit tests, docs build, gitleaks —
# runs automatically on every push/PR and carries NO secrets. This workflow is
# the ONLY one that touches Modal/R2, so it is locked behind TWO maintainer
# gates that GitHub enforces server-side (neither can be bypassed by editing
# this file in a PR):
#
#   Gate 1 — the `deploy-approved` label. This workflow only STARTS when the
#     label is added to a PR (`pull_request: types: [labeled]`) or when a
#     maintainer manually runs it (`workflow_dispatch`). Applying a label needs
#     repo write, so only maintainers can trigger it — opening/updating a PR
#     does nothing here.
#   Gate 2 — the `biolm-hub-dev` GitHub Environment. The only secret-bearing job
#     (`deploy-and-test`) declares `environment: biolm-hub-dev`, which must be
#     configured with REQUIRED REVIEWERS. GitHub pauses the job for manual
#     approval before exposing the environment's secrets, and the approval
#     prompt shows the exact commit SHA being deployed.
#
# ─────────────────────────  SECURITY MODEL (read first)  ─────────────────────────
#  • Deploying a PR's model necessarily runs that PR's code (config.py / app.py)
#    on Modal with the maintainer's Modal token in scope. The review-then-label
#    step IS the code-trust boundary: a maintainer MUST read the full diff before
#    applying `deploy-approved`.
#  • Secrets live ONLY as `biolm-hub-dev` ENVIRONMENT secrets (never repo-wide). A
#    job can read an environment's secrets only if it declares that environment,
#    so the required-reviewer gate is unavoidable. Repo-wide secrets would
#    silently skip that gate — the `preflight` step below fails fast if an
#    environment-only sentinel secret is missing, so a misconfiguration can't
#    quietly run with repo-wide creds.
#  • `detect` checks out PR code but is secret-free (read-only token, no
#    secrets), so a PR's detector can at most influence WHICH of the PR's models
#    deploy — all still gated by Gate 2 + reviewed under Gate 1.
#  • Commit-binding: the `labeled` event pins the run to the PR HEAD at click
#    time, and a later push does NOT trigger a deploy (there is no `synchronize`
#    trigger). The Gate-2 approval prompt shows that pinned SHA, so the code that
#    deploys is exactly what the maintainer reviewed. To deploy a newer commit,
#    remove and re-add the label (re-review first).
#
# Maintainer setup (one-time — see CONTRIBUTING.md "Continuous integration &
# deploys" for the full checklist):
#   1. Create a `deploy-approved` label.
#   2. Create a `biolm-hub-dev` GitHub Environment with REQUIRED REVIEWERS (the
#      maintainers), and store the secrets below as ENVIRONMENT secrets on it
#      (NOT repo-wide).
#   3. Scope the Modal token to the `biolm-hub-dev` workspace and the R2 creds to
#      a READ-ONLY dev bucket, so an approved deploy can only touch dev infra.
#
# Note: one approval can fan out to MANY models — a change under `models/commons/`
# (or a PR that edits the detector) can mark every model affected. The matrix is
# bounded only by your review, so review the full diff before labeling.
#
# Required secrets (store on the `biolm-hub-dev` Environment, not repo-wide):
#   BIOLM_HUB_DEV_ENVIRONMENT_SENTINEL       — any non-empty value; its presence
#       proves the job resolved ENVIRONMENT secrets (the preflight fails if
#       absent, catching secrets mistakenly stored repo-wide).
#   MODAL_TOKEN_ID / MODAL_TOKEN_SECRET  — Modal auth (token scoped to the
#       biolm-hub-dev workspace).
#   R2_ACCESS_KEY_ID / R2_SECRET_ACCESS_KEY / R2_REGION / R2_ENDPOINT
#       — Cloudflare R2 read creds for a read-only dev bucket, so the local test
#         process can load golden fixtures (mapped to the AWS_* env vars the
#         storage client reads).

name: Gated Deploy & Test

on:
  # Gate 1: only a maintainer adding the `deploy-approved` label (job `if:`
  # filters to that label name) or a manual dispatch can start this workflow.
  # There is deliberately NO push/PR-open/synchronize trigger.
  pull_request:
    types: [labeled]
  workflow_dispatch:
    inputs:
      models:
        description: "Models to deploy to biolm-hub-dev (space- or comma-separated slugs, e.g. `esm2 prostt5`)."
        required: true
        type: string

# Read-only by default; no job needs more.
permissions:
  contents: read

concurrency:
  group: gated-deploy-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  # The `detect` job's `if:` hardcodes this label name (the `env` context isn't
  # available in a job-level `if:`) — keep the two in sync if it ever changes.
  APPROVAL_LABEL: deploy-approved
  MODAL_ENVIRONMENT: biolm-hub-dev

jobs:
  # Secret-free target resolution. Runs only when a maintainer approves (label)
  # or manually dispatches.
  detect:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.action == 'labeled' && github.event.label.name == 'deploy-approved')
    runs-on: ubuntu-latest
    outputs:
      models_changed: ${{ steps.detect.outputs.models_changed }}
      has_models: ${{ steps.detect.outputs.has_models }}
      models_with_code_changes: ${{ steps.detect.outputs.models_with_code_changes }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # labeled → the exact reviewed PR commit; dispatch → the chosen ref.
          # fetch-depth: 0 so detect_models.py can diff against the base.
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Resolve target models
        id: detect
        # labeled           → diff the reviewed commit vs the PR base (detect_models.py,
        #                     stdlib-only). BASE_REF is quoted so a PR-controlled value
        #                     can't inject shell. Two-dot diff may over-detect if base
        #                     advanced — that only costs extra (gated) deploys.
        # workflow_dispatch → deploy exactly the `models` input. Names are validated
        #                     against the same ^[A-Za-z0-9_-]+$ slug rule detect_models.py
        #                     uses, and read via env (never interpolated into the shell).
        env:
          EVENT_NAME: ${{ github.event_name }}
          DISPATCH_MODELS: ${{ inputs.models }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            python3 - <<'PY'
          import json, os, re, sys

          raw = os.environ.get("DISPATCH_MODELS", "")
          names = [n for n in re.split(r"[\s,]+", raw.strip()) if n]
          if not names:
              sys.exit("workflow_dispatch requires a non-empty `models` input")
          safe = re.compile(r"^[A-Za-z0-9_-]+$")
          bad = [n for n in names if not safe.match(n)]
          if bad:
              sys.exit(f"Refusing unsafe model name(s): {bad!r}")
          with open(os.environ["GITHUB_OUTPUT"], "a") as fh:
              fh.write(f"models_changed={json.dumps(names)}\n")
              fh.write(f"models_with_code_changes={json.dumps(names)}\n")
              fh.write("has_models=true\n")
          print(f"Dispatch will deploy: {names}")
          PY
          else
            git fetch origin "$BASE_REF" --depth=1
            python .github/scripts/detect_models.py "origin/$BASE_REF" --smart
          fi

  # The ONLY job with secrets. One model per matrix leg.
  deploy-and-test:
    needs: detect
    if: needs.detect.outputs.has_models == 'true'
    runs-on: ubuntu-latest
    # Gate 2: binds secrets to the `biolm-hub-dev` Environment, whose required
    # reviewers must approve (showing the commit SHA) before this job runs.
    environment: biolm-hub-dev
    strategy:
      fail-fast: false
      matrix:
        model: ${{ fromJson(needs.detect.outputs.models_changed) }}
    steps:
      # Fail-fast BEFORE checking out any (untrusted) PR code: confirm the
      # secrets actually resolved from the `biolm-hub-dev` Environment. The sentinel
      # exists only as an environment secret, so if it's blank the creds are
      # misconfigured (e.g. stored repo-wide) and we must not proceed.
      - name: Preflight — confirm biolm-hub-dev environment secrets
        env:
          SENTINEL: ${{ secrets.BIOLM_HUB_DEV_ENVIRONMENT_SENTINEL }}
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        run: |
          missing=""
          [ -n "$SENTINEL" ] || missing="$missing BIOLM_HUB_DEV_ENVIRONMENT_SENTINEL(environment-only-sentinel)"
          [ -n "$MODAL_TOKEN_ID" ] || missing="$missing MODAL_TOKEN_ID"
          [ -n "$MODAL_TOKEN_SECRET" ] || missing="$missing MODAL_TOKEN_SECRET"
          [ -n "$R2_ACCESS_KEY_ID" ] || missing="$missing R2_ACCESS_KEY_ID"
          [ -n "$R2_SECRET_ACCESS_KEY" ] || missing="$missing R2_SECRET_ACCESS_KEY"
          [ -n "$R2_ENDPOINT" ] || missing="$missing R2_ENDPOINT"
          if [ -n "$missing" ]; then
            echo "::error::Missing required biolm-hub-dev ENVIRONMENT secret(s):$missing"
            echo "These must be set as ENVIRONMENT secrets on the 'biolm-hub-dev' Environment"
            echo "(Settings → Environments → biolm-hub-dev), NOT as repo-wide secrets — otherwise"
            echo "the required-reviewer approval gate is silently skipped. See CONTRIBUTING.md."
            exit 1
          fi
          echo "biolm-hub-dev environment secrets present; proceeding."

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          # This job runs untrusted PR code and needs no git creds afterward.
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39 # v3.2.4

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras

      # matrix.model originates from PR-controlled directory names (or the
      # dispatch input). It is validated to ^[A-Za-z0-9_-]+$ before reaching the
      # matrix, and passed via a quoted env var here as defense-in-depth.
      - name: Deploy ${{ matrix.model }} to ${{ env.MODAL_ENVIRONMENT }}
        env:
          MODEL: ${{ matrix.model }}
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
        run: uv run bh deploy "$MODEL" --force

      - name: Integration tests — ${{ matrix.model }}
        env:
          MODEL: ${{ matrix.model }}
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
          # Storage client reads these env var names (Cloudflare R2 via S3 API).
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.R2_REGION }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        run: uv run pytest "models/$MODEL/test.py" -m integration --no-cov -v

      - name: Deployment tests — ${{ matrix.model }}
        # Only for models with DIRECT code changes (commons-triggered models are
        # deployed + integration-tested above, but don't need endpoint tests).
        if: contains(fromJson(needs.detect.outputs.models_with_code_changes), matrix.model)
        env:
          MODEL: ${{ matrix.model }}
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.R2_REGION }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        run: uv run pytest "models/$MODEL/test.py" -m deployment --no-cov -v
