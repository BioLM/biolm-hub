name: Docs site

# Builds the mkdocs site and publishes it to GitHub Pages.
#
# DORMANT BY DEFAULT. The deploy job is gated so normal pushes don't fail while
# Pages is disabled (the `docs` job in ci.yml already build-checks the site on
# every push/PR, so coverage isn't lost). To go live:
#   1. Settings → Pages → Build and deployment → Source: "GitHub Actions".
#   2. Add a repository variable `PAGES_ENABLED` = `true`.
# After that, every push to main publishes. A manual `workflow_dispatch` run
# always builds + deploys (use it for the first publish).
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    if: github.event_name == 'workflow_dispatch' || vars.PAGES_ENABLED == 'true'
    name: build · deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39 # v3.2.4
      - run: uv python install 3.12
      - run: uv sync --all-extras
      - run: uv run mkdocs build --strict
      - uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5.0.0
      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: site
      - id: deploy
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
