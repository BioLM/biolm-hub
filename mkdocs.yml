site_name: biolm-hub
site_description: A standardized, agent-first catalog of open biological ML models that deploy on Modal.
repo_url: https://github.com/BioLM/biolm-hub
repo_name: BioLM/biolm-hub
edit_uri: ""

theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.highlight
  palette:
    - scheme: default
      primary: teal
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - HTTP API: api.md
  - Errors: errors.md          # generated by docs/gen_pages.py
  - Models: models/        # expanded from docs/models/SUMMARY.md (generated)
  - Philosophy: philosophy.md
  - Contributing: contributing.md
  - Future work: future-work.md

# The per-model pages, the catalog index, the Models nav (SUMMARY.md), and the
# Philosophy/Contributing/Future-work pages are all generated at build time by
# docs/gen_pages.py from each model's config + knowledge graph and the root
# Markdown — there are no committed copies to drift.
plugins:
  - search
  - gen-files:
      scripts:
        - docs/gen_pages.py
  - literate-nav:
      nav_file: SUMMARY.md

markdown_extensions:
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.details
  - tables
  - toc:
      permalink: true

# The generator scripts live in docs/ but are tooling, not site content.
# (models/SUMMARY.md is the literate-nav source for the Models section; it drives
# the nav and is marked EXCLUDED in docs/gen_pages.py so it isn't a standalone
# page — `exclude_docs` can't catch it, see the note there.)
exclude_docs: |
  *.py
  __pycache__/
  media/*.md

# `mkdocs build --strict` (CI) fails on warnings. Embedded knowledge-graph prose
# carries intra-doc anchors that may not all resolve after section nesting; keep
# anchors at info so a genuinely broken nav/page link still fails the build.
validation:
  omitted_files: warn
  absolute_links: ignore
  unrecognized_links: warn
  links:
    not_found: warn
    anchors: info
