  md_r2: pending
- title: CDR-aware masked language models for paired antibodies enable state-of-the-art binding prediction
  doi: 10.1101/2025.10.31.685149
  year: 2025
  relevance: Compares CDR-focused fine-tuning strategies against AbLang2 and other antibody language models, demonstrating
    that region-aware pretraining on paired sequences can surpass AbLang2 on binding affinity prediction.
  molecule_focus: antibody
  task_focus: binding_prediction
