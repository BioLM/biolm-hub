- title: 'ALLM-Ab: Active Learning-Driven Antibody Optimization Using Fine-Tuned Protein Language Models'
  doi: 10.1021/acs.jcim.5c01577
  year: 2025
  relevance: Uses AbLang2 perplexity scores as a key developability constraint in an active-learning antibody optimization
    framework. AbLang2 naturalness scoring guides multiobjective optimization alongside binding affinity, hydropathicity,
    and stability metrics, with quantitative results on deep mutational scanning datasets.
  molecule_focus: antibody
  task_focus: antibody_optimization
  pdf_r2: pending
  md_r2: pending
- title: 'AbBiBench: A Benchmark for Antibody Binding Affinity Maturation and Design'
  arxiv: '2506.04235'
  year: 2025
  relevance: Benchmarks AbLang2 (via its fine-tuned derivative CurrAb) alongside 14 other protein models on 184,500+ experimental
    antibody-antigen binding measurements across 14 antibodies and 9 antigens. CurrAb improved Spearman correlation by +0.074
    over ESM-2 baseline, establishing the value of antibody-specific language model fine-tuning for affinity prediction.
  molecule_focus: antibody
  task_focus: binding_prediction
