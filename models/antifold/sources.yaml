- title: 'AbBiBench: A Benchmark for Antibody Binding Affinity Maturation and Design'
  arxiv: '2506.04235'
  year: 2025
  relevance: Benchmarks AntiFold alongside 14 other protein models on 184,500+ experimental antibody-antigen binding measurements.
    AntiFold (ESM-IF fine-tuned on antibodies) showed a -0.097 drop in affinity correlation vs ESM-IF, revealing potential
    catastrophic forgetting from antibody-specific fine-tuning in the complex-level binding prediction setting. Inverse folding
    models as a class outperformed all other model categories.
  molecule_focus: antibody
  task_focus: binding_prediction
  pdf_r2: knowledge-base/models/antifold/applied/papers/unknown2025d.pdf
  md_r2: pending
- title: 'nanoFOLD: sequence design of nanobodies via inverse folding'
  doi: 10.1101/2025.04.29.651236
  year: 2025
  relevance: Develops a nanobody-specific inverse folding model (nanoFOLD) fine-tuned from ESM-IF and benchmarks it directly
    against AntiFold on VHH sequence recovery and binder enrichment. nanoFOLD outperforms AntiFold on nanobody-specific tasks
    (75% VHH recovery vs AntiFold lower), while AntiFold retains superiority on Fab antibody design, quantifying the domain-specificity
    gap.
  molecule_focus: nanobody
  task_focus: inverse_folding
  pdf_r2: knowledge-base/models/antifold/applied/papers/unknown2025e.pdf
