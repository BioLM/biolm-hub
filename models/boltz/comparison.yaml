model_slug: boltz
display_name: Boltz
last_updated: "2026-03-17"

strengths:
  - "First fully open-source (MIT license) structure prediction model to match AlphaFold3 accuracy on biomolecular complexes, enabling unrestricted academic and commercial use"
  - "Handles all major biomolecule types in a single model -- protein, DNA, RNA, small-molecule ligands, and arbitrary multi-chain complexes -- without requiring separate tools for each"
  - "Boltz-2 adds binding affinity prediction (log10 IC50) achieving ~0.6 Pearson correlation with experimental values on the FEP+ benchmark, comparable to Schrodinger FEP+ at ~1000x lower computational cost"
  - "Supports pocket-constrained docking in Boltz-2, allowing simultaneous structure prediction and ligand placement within a specified binding site with induced-fit backbone refinement"
  - "Provides multiple confidence metrics including pLDDT (per-residue), pTM/ipTM (global/interface), and ipSAE (robust interface quality metric that corrects for chain length and disorder bias in ipTM)"
  - "Two model versions available: Boltz-1 for general structure prediction and Boltz-2 for structure + affinity prediction; Boltz-2 is strictly superior for all use cases"
  - "Accepts pre-computed MSA input (UniRef90, MGnify, Small BFD) to substantially improve prediction accuracy for proteins with distant homologs"
  - "Supports post-translational modifications via CCD codes and cyclic protein chains, covering a wider range of biological chemistry than most competing models"

weaknesses:
  - "Requires A100 40GB GPU for inference, making it one of the most resource-intensive models on the platform -- significantly more expensive per prediction than single-chain models like ESMFold"
  - "Affinity predictions in Boltz-2 are highly stochastic (80%+ variance between runs), requiring multiple diffusion samples and ensemble averaging for reliable results"
  - "Single-sequence mode (no MSA) substantially degrades accuracy, especially for proteins with distant homologs -- MSA generation adds preprocessing time and complexity"
  - "RNA structure prediction accuracy is lower than protein structure prediction, consistent with all current methods but still a limitation for RNA-focused projects"
  - "Membrane protein prediction is weak due to under-representation in training data, and the model cannot account for lipid bilayer context"
  - "Produces a single static conformation from diffusion sampling, making it unsuitable for intrinsically disordered proteins or conformational ensembles"
  - "Affinity prediction is only validated for drug-like small molecules (MW < 500, < 56 heavy atoms) bound to protein targets -- not validated for RNA/DNA targets or large molecular ligands"
  - "Very short peptides (below ~15 residues) lack sufficient structural context for reliable predictions; minimum practical input is ~5 residues"

use_when:
  - "You need to predict the 3D structure of a multi-component complex (protein-protein, protein-ligand, protein-DNA/RNA) and no experimental structure is available"
  - "You need combined structure prediction and binding affinity estimation for drug-like small molecules against protein targets in a single workflow"
  - "You are running a virtual screening campaign and need to rank compounds by predicted binding affinity at scale, without the cost of physics-based FEP calculations"
  - "You want to model how mutations at protein-protein or protein-ligand interfaces affect binding geometry by comparing wild-type and mutant complex structures"
  - "You need pocket-constrained docking where the binding site is known from mutagenesis, co-crystal structures, or computational predictions, with simultaneous induced-fit backbone refinement"
  - "You require an open-source, commercially licensable (MIT) alternative to AlphaFold3 for biomolecular complex structure prediction"
  - "You are designing a multi-step pipeline where predicted complex structures feed into downstream tools like ProteinMPNN for inverse folding or RFdiffusion3 for binder design"
  - "You need confidence-scored predictions with per-residue (pLDDT), global (pTM), and interface-specific (ipSAE) quality metrics to triage which predictions are trustworthy"

dont_use_when:
  - "You only need single-chain protein structure prediction and speed is critical -- use ESMFold instead, which is orders of magnitude faster and requires no MSA"
  - "You need to model conformational ensembles or intrinsically disordered protein regions -- Boltz produces a single static structure (consider molecular dynamics or ensemble methods)"
  - "You need high-accuracy membrane protein structures with lipid bilayer context -- Boltz under-represents membrane proteins and cannot model the bilayer environment"
  - "You need binding affinity predictions for non-drug-like molecules (MW > 500, > 56 heavy atoms) or for RNA/DNA targets -- these are outside Boltz-2's validated domain"
  - "You need the highest possible accuracy on a specific target and have budget for physics-based methods -- Schrodinger FEP+ may achieve slightly higher affinity accuracy at ~1000x computational cost"
  - "You have limited GPU resources (no A100 available) and need a lightweight structure prediction model -- use ESMFold for single chains or AF2 NIM for AlphaFold2-based predictions on smaller GPUs"
  - "You need structure-conditioned sequence design directly -- use ProteinMPNN instead, which accepts backbone coordinates and outputs optimized sequences"

alternatives:
  - model: chai1
    when_better: "Alternative open-source architecture for complex structure prediction; may perform better on specific protein-protein targets due to different training methodology"
    when_worse: "No binding affinity prediction capability, no pocket constraint support, and no dedicated interface confidence metrics like ipSAE -- Boltz-2 is strictly more capable"
  - model: rf3
    when_better: "RoseTTAFold All-Atom handles small molecules and may have advantages on targets where its training data distribution differs from Boltz's"
    when_worse: "No dedicated affinity prediction head, less accurate on protein-ligand binding affinity benchmarks, and no pocket-constrained docking support"
  - model: esmfold
    when_better: "Orders of magnitude faster inference, no MSA required, runs on smaller GPUs -- ideal for high-throughput single-chain structure prediction"
    when_worse: "Single-chain proteins only; cannot handle ligands, DNA, RNA, or multi-chain complexes; generally lower accuracy than diffusion-based methods on complex targets"
  - model: af2_nim
    when_better: "AlphaFold2-based predictions via NVIDIA NIM with optimized inference; well-validated on single-chain and homo-oligomer targets with extensive community benchmarking"
    when_worse: "Limited to protein-only predictions (no ligands, DNA, RNA); no affinity prediction; AlphaFold2 architecture is less capable than diffusion-based approaches for multi-molecule complexes"

complements:
  - model: mpnn
    workflow: "Predict complex structure with Boltz, then use ProteinMPNN for inverse folding to design sequences that fold into the predicted structure -- enables structure-guided protein design pipelines"
    example_protocol: null
  - model: esm2
    workflow: "Use ESM2 for fast embedding-based screening and fitness prediction across large sequence libraries, then run Boltz on top candidates for detailed structural modeling of complexes"
    example_protocol: null
  - model: rfd3
    workflow: "Use RFdiffusion3 to generate de novo binder backbone scaffolds targeting a protein of interest, then predict the designed complex structure with Boltz to validate binding geometry and estimate affinity with Boltz-2"
    example_protocol: null
  - model: thermompnn
    workflow: "Predict complex structure with Boltz, then use ThermoMPNN to estimate the thermodynamic stability effects of mutations at the predicted interface -- guides rational mutagenesis for binding optimization"
    example_protocol: null
