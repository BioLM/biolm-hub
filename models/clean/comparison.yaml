model_slug: clean
display_name: CLEAN
last_updated: "2026-03-17"

strengths:
  - "Published in Science (2023) with state-of-the-art enzyme function prediction: F1=0.760 on the New-392 benchmark for novel enzymes, dramatically outperforming BLASTp (F1=0.117) and traditional alignment methods"
  - "Contrastive learning approach produces a 128-dimensional enzyme functional similarity embedding space where distance correlates with EC classification, enabling both prediction and similarity search"
  - "Max-separation algorithm automatically determines the number of EC annotations per sequence, detecting promiscuous enzymes with multiple catalytic activities (up to 5 predictions per query)"
  - "GMM ensemble provides calibrated confidence scores for each prediction, enabling users to set application-specific confidence thresholds"
  - "No retraining needed to accommodate new EC classes -- simply compute cluster centers from a few example sequences, making the model extensible as new enzymes are characterized"
  - "Dual-action model: predict returns EC number annotations with confidence, encode returns 128-dimensional embeddings for custom downstream analyses (clustering, similarity search, feature engineering)"
  - "Covers approximately 5,242 EC classes from SwissProt, spanning all seven enzyme commission reaction classes"

weaknesses:
  - "Enzyme-only model -- predictions are meaningless for non-enzyme proteins; the model will assign the nearest EC cluster regardless of whether the query is actually an enzyme"
  - "Maximum sequence length of 1022 amino acids due to ESM-1b positional encoding limit -- longer enzymes are truncated"
  - "Sequence-only approach (ESM-1b backbone) -- does not incorporate 3D structural information that could improve predictions for structurally characterized enzymes"
  - "Predictions capped at 5 EC annotations per sequence via max-separation algorithm -- highly promiscuous enzymes with more than 5 activities may be under-annotated"
  - "Short peptides (below ~30 residues) produce poor ESM-1b representations, leading to unreliable EC predictions"
  - "Requires T4 GPU with 16 GB RAM due to ESM-1b backbone -- not available for CPU-only deployments"
  - "Training data limited to SwissProt enzymes clustered at 100% identity; performance may degrade on enzyme families under-represented in SwissProt"

use_when:
  - "You need to annotate enzyme function (EC numbers) for protein sequences that lack close homologs in databases -- CLEAN excels precisely where BLASTp and HMMER fail"
  - "You are analyzing metagenomic data and need to assign enzyme function to novel predicted proteins from uncultured organisms"
  - "You want to detect enzyme promiscuity -- identifying proteins that may catalyze multiple different reactions"
  - "You need functional similarity embeddings for enzymes to cluster enzyme families, build similarity networks, or use as features in custom ML pipelines"
  - "You are annotating enzymes from directed evolution campaigns and want to predict whether mutations have altered catalytic function (EC class change)"
  - "You need confidence-scored EC predictions to triage: high-confidence predictions proceed directly, low-confidence ones are flagged for experimental validation"

dont_use_when:
  - "Your query sequences are not enzymes -- CLEAN will produce meaningless EC predictions for non-catalytic proteins (receptors, structural proteins, antibodies)"
  - "You need structure-based function prediction and have 3D coordinates available -- consider structure-aware methods like GraphEC that leverage geometric features"
  - "You need to predict protein properties other than enzyme function (stability, solubility, toxicity) -- use the appropriate specialized predictor on the platform"
  - "Your sequences exceed 1022 residues and you cannot truncate without losing critical functional domains"
  - "You need GO term predictions beyond EC numbers -- CLEAN predicts only EC classifications, not broader Gene Ontology annotations"
  - "You need general protein embeddings for non-enzyme tasks -- use ESM2 for broader protein language model representations"

alternatives:
  - model: esm2
    when_better: "ESM2 provides general-purpose protein embeddings suitable for any downstream task (not just enzyme function) and supports multiple size variants from 8M to 3B parameters; zero-shot variant scoring via log-likelihoods"
    when_worse: "ESM2 does not predict EC numbers directly; CLEAN's contrastive learning objective specifically optimizes for enzyme functional similarity, producing substantially better enzyme annotation accuracy"
  - model: diamond
    when_better: "DIAMOND provides alignment-based homology search against patent or custom databases with interpretable sequence alignments and E-values; useful when functional transfer by homology is appropriate"
    when_worse: "Alignment-based methods fail catastrophically on novel enzymes with low sequence identity to known entries (BLASTp F1=0.117 vs CLEAN F1=0.760 on New-392)"
  - model: gemme
    when_better: "GEMME provides variant effect prediction across all positions using MSA-based evolutionary analysis -- complementary for understanding mutation tolerance in enzymes"
    when_worse: "GEMME does not predict enzyme function or EC numbers; it predicts relative fitness effects of mutations, which is a different task"

complements:
  - model: esm2
    workflow: "Use CLEAN predict to annotate enzyme function (EC numbers) and CLEAN encode for functional embeddings, then use ESM2 encode for general protein representations -- combining enzyme-specific and general-purpose features for richer downstream analyses"
    example_protocol: null
  - model: boltz
    workflow: "After CLEAN identifies EC function, use Boltz to predict the enzyme's 3D structure for mechanistic analysis and active site visualization -- linking sequence-based function prediction with structural understanding"
    example_protocol: null
  - model: camsol
    workflow: "After CLEAN identifies enzyme candidates, screen them with CamSol for solubility to ensure the annotated enzymes can be expressed and purified for experimental validation"
    example_protocol: null
