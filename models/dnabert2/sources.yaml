- title: 'DeepVRegulome: DNABERT-based deep-learning framework for predicting the functional impact of short genomic variants
    on the human regulome'
  arxiv: '2511.09026'
  year: 2025
  relevance: Combines 700 DNABERT fine-tuned models trained on ENCODE gene regulatory regions (TFs, histones, RBPs, splice
