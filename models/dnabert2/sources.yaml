    Sites'
  arxiv: '2502.01311'
  year: 2025
  relevance: Uses pre-trained DNABERT for sequence embedding combined with CNN, Modified Convolutional Block Attention Module
    (MCBAM), and Multi-Scale Convolutions with Attention (MSCA) for TFBS prediction. Trained and tested on 165 ENCODE ChIP-seq
    datasets, demonstrating DNABERT embeddings capture long-range dependencies critical for transcription factor binding site
    identification.
  molecule_focus: dna
  task_focus: transcription_factor_binding
