  md_r2: pending
- title: Enhancing missense variant pathogenicity prediction with protein language models using VariPred
  doi: 10.1038/s41598-024-51489-7
  year: 2024
  relevance: Benchmarks ESM-1v alongside ESM-1b and ESM-2 for variant pathogenicity prediction, demonstrating that combining
    log-likelihood ratios with residue embeddings achieves MCC of 0.714 without structural features or MSAs.
  molecule_focus: protein
  task_focus: variant_effect_prediction
  pdf_r2: pending
  md_r2: pending
- title: Fine-tuning Protein Language Models with Deep Mutational Scanning improves Variant Effect Prediction
  arxiv: '2405.06729'
  year: 2024
  relevance: Demonstrates that fine-tuning ESM-1v on deep mutational scanning data with a Normalised Log-odds Ratio head consistently
    improves variant effect prediction across ProteinGym and ClinVar benchmarks.
  molecule_focus: protein
  task_focus: variant_effect_prediction
  pdf_r2: knowledge-base/models/esm1v/applied/papers/arxiv2405.06729.pdf
  md_r2: pending
- title: "ESM-scan \u2014 A tool to guide amino acid substitutions"
  doi: 10.1002/pro.5221
  year: 2024
  relevance: Builds ESM-Scan on ESM-1v zero-shot predictions for in silico deep mutational scanning, enabling genome-wide
    prediction of preferential amino acid substitutions for protein engineering
  molecule_focus: protein
  task_focus: protein engineering
  pdf_r2: pending
  md_r2: pending
- title: Accurate prediction of functional effect of single amino acid variants with deep learning
  doi: 10.1016/j.csbj.2023.11.017
  year: 2023
  relevance: Rep2Mut-V2 uses ESM-1v 33rd-layer representations to predict variant effects across 38 proteins (118,933 variants),
