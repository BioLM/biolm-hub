- title: Genome-wide prediction of disease variant effects with a deep protein language model
  doi: 10.1038/s41588-023-01465-0
  year: 2023
  relevance: Uses ESM1b (closely related to ESM-1v) to predict all ~450 million possible missense variant effects in the human
    genome, outperforming existing methods on ~150,000 ClinVar/HGMD variants and 28 deep mutational scan datasets.
  molecule_focus: protein
