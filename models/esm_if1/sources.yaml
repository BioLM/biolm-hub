- title: Advancing protein evolution with inverse folding models integrating structural and evolutionary constraints
  doi: 10.1016/j.cell.2025.06.014
  year: 2025
  relevance: Introduces AiCE, which samples mutations from inverse folding models (including ESM-IF1) with structural and
    evolutionary constraints; AiCEsingle outperforms other AI methods by 36-90% across 60 deep mutational scanning datasets,
    demonstrating ESM-IF1 as a practical backbone for guided protein evolution.
  molecule_focus: protein
  task_focus: protein_engineering
  pdf_r2: pending
  md_r2: pending
- title: Benchmarking and Consensus Ranking of Inverse Folding Models for Protein-Ligand Interface Design
  doi: 10.1145/3768322.3769031
  year: 2025
  relevance: Evaluates ESM-IF1 alongside ProteinMPNN, LigandMPNN, CARBonAra, and ProRefiner on 25,716 protein-ligand complexes;
    consensus-ranked sequences using a LightGBM LambdaMART model outperform individual models in stability, binding affinity,
