  doi: 10.1038/s42004-023-01029-7
  year: 2023
  relevance: Combines ESM-IF1 with Foldseek and AlphaFold2 for de novo peptide binder design, showing ESM-IF1 designs successful
    binders for 6.5% of heteromeric interfaces versus 1.5% for ProteinMPNN.
