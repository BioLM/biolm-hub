model_slug: esmstabp
display_name: ESMStabP
last_updated: "2026-03-17"

strengths:
  - "Achieves R-squared 0.94 on test data for melting temperature prediction, substantially outperforming predecessors DeepSTABp (R-squared 0.81) and ProTstab2 (R-squared 0.51)"
  - "Sequence-only input with no structure requirement -- predicts Tm from amino acid sequence alone, making it applicable to any protein including uncharacterized sequences"
  - "Optional organism growth temperature (OGT) context dramatically improves accuracy by calibrating predictions based on whether the source organism is thermophilic or mesophilic"
  - "CPU-only inference after ESM2 embedding extraction (Random Forest model) -- lightweight deployment with 4 GB RAM and no GPU for the ESMStabP model itself"
  - "Trained on combined data from three major thermostability datasets (DeepStabP, DeepTM, TemBERTure), providing broad coverage across thermophilic, mesophilic, and psychrophilic organisms"
  - "MAE of approximately 3-4 degrees C -- sufficient for ranking and screening applications where relative ordering matters more than absolute precision"
  - "MIT license enables unrestricted commercial use in industrial enzyme engineering and pharmaceutical protein development"

weaknesses:
  - "Predicts global melting temperature (Tm) only -- does not identify which specific mutations would stabilize or destabilize the protein; no per-mutation ddG resolution"
  - "Depends on ESM2-650M as a prerequisite service for embedding generation, adding deployment complexity and inference latency"
  - "MAE of 3-4 degrees C is useful for screening but insufficient for precise stability engineering where 1-2 degree differences matter"
  - "Very recent model (bioRxiv preprint February 2025) with no independent validation studies or applied literature citations yet"
  - "Does not account for formulation conditions (pH, buffer, excipients, ionic strength) that strongly influence protein thermal stability in practice"
  - "Maximum sequence length of 1022 residues (ESM2 limit) -- longer proteins are truncated"
  - "Mean-pooled ESM2 embedding averages over the entire sequence, potentially masking domain-specific stability differences in multi-domain proteins"

use_when:
  - "You need to estimate melting temperature for a protein from sequence alone, without experimental data or 3D structure"
  - "You are screening a large library of enzyme or protein variants and want to rank them by predicted thermostability before experimental DSC/DSF measurement"
  - "You know the source organism's optimal growth temperature and want to leverage this context for more accurate Tm prediction"
  - "You are building a protein design pipeline and need a fast stability filter to eliminate thermally unstable candidates before further evaluation"
  - "You want a quantitative Tm estimate (in degrees C) rather than a binary thermophilic/mesophilic classification"
  - "You need to prioritize industrial enzyme candidates for thermostability -- especially when the organism of origin provides useful context via OGT"

dont_use_when:
  - "You need per-mutation stability predictions (ddG) to identify specific stabilizing mutations -- use ThermoMPNN or SPURS with a 3D structure"
  - "You need precise Tm measurements (within 1 degree C) for regulatory or formulation purposes -- use experimental DSC/DSF"
  - "You are working with membrane proteins whose stability depends on the lipid/detergent environment, which ESMStabP does not model"
  - "You need to predict how specific mutations change Tm -- ESMStabP predicts absolute Tm per sequence but does not provide delta-Tm for mutations"
  - "You are working with very long proteins (>1022 residues) that would be truncated by the ESM2 context limit"
  - "You want a self-contained model without ESM2 dependency -- TemBERTure is self-contained with its own ProtBERT backbone"

alternatives:
  - model: temberture
    when_better: "TemBERTure provides both classification (thermophilic vs non-thermophilic) and regression (Tm) modes with its own ProtBERT-BFD backbone, plus thermostability-aware embeddings via the encode action"
    when_worse: "ESMStabP achieves higher regression accuracy (R-squared 0.94 vs TemBERTure's benchmark performance) by leveraging ESM2-650M representations and combined training data"
  - model: thermompnn
    when_better: "ThermoMPNN provides per-mutation ddG predictions from 3D structure, identifying specific stabilizing mutations rather than just global Tm"
    when_worse: "ThermoMPNN requires a 3D structure (PDB) as input; predicts ddG per mutation rather than absolute Tm; cannot screen sequences without structures"
  - model: spurs
    when_better: "SPURS provides per-mutation ddG with multi-mutation epistasis support and full DMS matrices from structure, enabling comprehensive stability engineering"
    when_worse: "SPURS requires structure and GPU; predicts relative ddG rather than absolute Tm; higher resource requirements"
  - model: tempro
    when_better: "TEMPRO is purpose-built for nanobody Tm prediction and may be more accurate for nanobodies specifically than a general protein model"
    when_worse: "TEMPRO is strictly limited to nanobodies (100-160 residues); ESMStabP handles any protein type"

complements:
  - model: esm2
    workflow: "ESM2 provides the embedding backbone that ESMStabP uses for Tm prediction; additionally, ESM2 log_prob can identify evolutionarily plausible mutations, and ESMStabP can then predict the Tm of each mutant sequence to quantify stability impact"
    example_protocol: null
  - model: camsol
    workflow: "Use ESMStabP to predict Tm (thermostability) and CamSol to predict solubility for each candidate -- thermostability and solubility are related but distinct properties, and optimizing both produces more developable proteins"
    example_protocol: null
  - model: thermompnn
    workflow: "Use ESMStabP for global Tm screening to identify thermally stable candidates, then use ThermoMPNN on their predicted structures to find additional stabilizing mutations via per-position ddG scanning"
    example_protocol: null
  - model: boltz
    workflow: "Screen protein candidates with ESMStabP for Tm, then predict 3D structures with Boltz for the most promising candidates, enabling structural analysis of thermostability determinants"
    example_protocol: null
