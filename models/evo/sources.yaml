    classification tasks relevant to Evo's capabilities.
  molecule_focus: dna
  task_focus: benchmark
  pdf_r2: pending
  md_r2: pending
- title: Evaluating DNA function understanding in genomic language models using evolutionarily implausible sequences
  arxiv: '2506.10271'
  year: 2025
  relevance: Introduces the Nullsettes benchmark to evaluate whether genomic language models understand DNA function or rely
    on evolutionary pattern-matching. Tests 12 gLMs on synthetic expression cassettes with no evolutionary precedent. Only
    Evo2-7B and GENERanno-0.5B deliver strong consistent performance, demonstrating Evo architecture's superior functional
    generalization beyond natural sequences.
  molecule_focus: dna
  task_focus: benchmark
  pdf_r2: knowledge-base/models/evo/applied/papers/unknown2025d.pdf
  md_r2: pending
- title: 'From Likelihood to Fitness: Improving Variant Effect Prediction in Protein and Genome Language Models'
  doi: 10.1101/2025.05.20.655154
  year: 2025
  relevance: Introduces Likelihood-Fitness Bridging (LFB), a general strategy that improves variant effect prediction by averaging
    model scores across sequences under similar selective pressures. Evaluated on the Evo 2 family of genome language models
    alongside ESM-2 and ProGen2 on large-scale deep mutational scans and clinical benchmarks, consistently improving predictive
    performance without retraining.
  molecule_focus: dna
  task_focus: variant_effect_prediction
  pdf_r2: knowledge-base/models/evo/applied/papers/unknown2025e.pdf
  md_r2: pending
