    workflow: "Generate coding DNA with Evo2, then use DNA-Chisel to optimize codon usage (CAI), verify synthesis feasibility (GC content, homopolymers, restriction sites), and prepare sequences for gene synthesis"
    example_protocol: null
  - model: "esm2"
    workflow: "Use Evo2 to analyze or generate genomic DNA, translate coding regions, then use ESM-2 to characterize the encoded proteins — creating a DNA-to-protein analysis pipeline spanning both modalities"
    example_protocol: null
  - model: "dnabert2"
    workflow: "Use Evo2 for long-context genomic analysis and DNABERT-2 for fine-grained BPE-resolution characterization of regulatory elements within specific regions of interest"
    example_protocol: null
