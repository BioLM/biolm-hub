- title: 'Interpreting Evo 2: Arc Institute''s Next-Generation Genomic Foundation Model'
  doi: 10.5281/zenodo.14895891
  year: 2025
  relevance: Applies sparse autoencoders to Evo 2 for mechanistic interpretability, revealing biologically meaningful features
    including exon-intron boundaries, transcription factor binding sites, and protein structural elements learned from DNA
    alone.
  molecule_focus: dna
  task_focus: interpretability
  pdf_r2: pending
  md_r2: pending
- title: A Benchmark of Evo2 Genomic AI Models for Efficient and Practical Deployment
  doi: 10.1101/2025.09.10.675279
  year: 2025
  relevance: Independent benchmark evaluating Evo2 7B and 40B models for practical deployment in cancer genomics. FP8 precision
    on H800 GPUs enables 4x faster inference than A100 while maintaining AUC 0.88-0.95. The 7B model outperformed the 40B
    variant which suffered accuracy drops (AUC as low as 0.48) on non-FP8 hardware. Validated on bladder urothelial carcinoma
    and ovarian cancer datasets.
  molecule_focus: dna
  task_focus: variant_effect_prediction
  pdf_r2: knowledge-base/models/evo2/applied/papers/unknown2025d.pdf
  md_r2: pending
- title: Evaluating DNA function understanding in genomic language models using evolutionarily implausible sequences
  arxiv: '2506.10271'
  year: 2025
  relevance: Introduces the Nullsettes benchmark testing 12 genomic language models on synthetic expression cassettes with
    no evolutionary precedent. Only Evo2-7B and GENERanno-0.5B deliver strong, consistent performance detecting loss-of-function
    mutations, while most other gLMs fail. Demonstrates Evo2's superior functional generalization beyond evolutionary pattern-matching.
  molecule_focus: dna
  task_focus: benchmark
  pdf_r2: knowledge-base/models/evo2/applied/papers/unknown2025e.pdf
  md_r2: pending
- title: 'Benchmarking DNA Foundation Models: Biological Blind Spots in Evo2 Variant-Effect Prediction'
  doi: 10.64898/2026.03.10.710786
  year: 2026
  relevance: Develops controlled evaluation metrics based on well-characterized nuclear and mitochondrial sequence features
    to identify systematic blind spots in Evo2, including weaknesses in short-range biological signals (codon usage bias)
    and sensitivity to biologically neutral contextual features. Challenges zero-shot pathogenicity prediction claims and
    provides framework for standardized evaluation.
  molecule_focus: dna
  task_focus: variant_effect_prediction
  pdf_r2: pending
  md_r2: pending
