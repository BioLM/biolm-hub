  molecule_focus: antibody
  task_focus: benchmark
  pdf_r2: pending
  md_r2: pending
- title: Investigating the ability of deep learning-based structure prediction to extrapolate and/or enrich the set of antibody
    CDR canonical forms
  doi: 10.3389/fimmu.2024.1352703
  year: 2024
  relevance: Uses ABodyBuilder2 (ImmuneBuilder) to predict structures for ~1.5 million paired antibody sequences and clusters
    CDR loops to discover new canonical forms. Quantifies the generalization and extrapolation limits of ABodyBuilder2 by
    retraining models with withheld CDR lengths and canonical forms, providing the largest-scale structural repertoire analysis
    powered by ImmuneBuilder.
  molecule_focus: antibody
  task_focus: structural_repertoire_analysis
  pdf_r2: pending
  md_r2: pending
- title: 'PROPERMAB: an integrative framework for in silico prediction of antibody developability using machine learning'
  doi: 10.1080/19420862.2025.2474521
  year: 2025
  relevance: Uses ABodyBuilder2 (ImmuneBuilder suite v0.0.8) to predict 3D Fv structures as a core pipeline step, then extracts
    structure-based molecular features for machine learning models predicting hydrophobic interaction chromatography retention
    time and high-concentration viscosity. Demonstrates ImmuneBuilder enabling repertoire-scale in silico developability screening
    at Regeneron.
  molecule_focus: antibody
  task_focus: developability_prediction
  pdf_r2: pending
  md_r2: pending
- title: 'Computational design of therapeutic antibodies with improved developability: efficient traversal of binder landscapes
    and rescue of escape mutations'
  doi: 10.1080/19420862.2025.2511220
  year: 2025
  relevance: Uses ABodyBuilder2 to predict antibody structures as a key step in a therapeutic design pipeline targeting SARS-CoV-2.
    ABodyBuilder2 structures are scored with the Therapeutic Antibody Profiler (TAP) to filter candidates, with experimental
    validation showing 54% of designs gained binding to escape variants and all designs improved in aggregation behavior.
  molecule_focus: antibody
  task_focus: therapeutic_antibody_design
  pdf_r2: pending
  md_r2: pending
