- title: Benchmarking inverse folding models for antibody CDR sequence design
  doi: 10.1371/journal.pone.0324566
  year: 2025
  relevance: Benchmarks CDR design tools on structures predicted by models like ImmuneBuilder, evaluating the full structure-to-sequence
