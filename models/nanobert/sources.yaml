- title: "NbBench: Benchmarking Language Models for Comprehensive Nanobody Tasks"
  doi: "10.48550/arXiv.2505.02022"
  venue: "arXiv preprint, 2025"
  year: 2025
  authors: ["Zhang Y", "Tsuda K"]
  pdf_r2: "pending"
  md_r2: "pending"
  relevance: >
    First comprehensive benchmark suite for nanobody modeling. Evaluates 11
    representative language models including NanoBERT across 8 biologically
    relevant tasks and 9 curated datasets. Reports quantitative results for
    NanoBERT on all tasks: VRCls accuracy 0.9947, SARS-CoV-2 binding AUROC
    0.876, hIL6 binding AUROC 0.904, paratope prediction AUROC 0.928,
    thermostability (Thermo-seq) Spearman 0.440, polyreactivity AUROC 0.815,
    NbType accuracy 0.988. Reveals no single model dominates across all tasks,
    with antibody-specific LMs excelling at antigen-related tasks while
    regression tasks remain challenging for all models.
- title: "Prediction of protein biophysical traits from limited data: a case study on nanobody thermostability through NanoMelt"
  doi: "10.1080/19420862.2024.2442750"
  venue: "mAbs, 2025"
  year: 2025
  authors: ["Ramon A", "Ni M", "Predeina O", "Gaffey R", "Kunz P", "Onuoha S", "Sormanni P"]
  pdf_r2: "pending"
  md_r2: "pending"
  relevance: >
    NanoMelt benchmarks 8 sequence embeddings (including NanoBERT) across 7
    regression models for nanobody thermostability prediction on a curated
    dataset of 640 apparent melting temperature measurements. NanoBERT with
    Gaussian Process Regression achieves Spearman 0.723, Pearson 0.784,
    MAE 5.1 C, ranking 34th of 56 embedding-model combinations. Demonstrates
    that general protein LMs (ESM-2) and antibody-specific LMs (AntiBERTy)
    outperform nanobody-specific NanoBERT on thermostability, while
    structure-based NanobodyBuilder2 embeddings achieve the best overall
    performance.
