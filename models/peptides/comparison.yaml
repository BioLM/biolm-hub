model_slug: peptides
display_name: Peptides
last_updated: "2026-03-17"

strengths:
  - "Computes ~140 physicochemical descriptors from amino acid sequence alone, providing a comprehensive feature set for peptide and protein characterization on the platform"
  - "Extremely lightweight deployment (0.125 CPU, 1 GB RAM, no GPU) -- the cheapest and fastest model on the platform, enabling screening of millions of sequences"
  - "Features are interpretable with direct physical meaning: molecular weight, isoelectric point, hydrophobicity, charge, instability index, Boman index -- each has established biological significance"
  - "Specifically designed for antimicrobial peptide (AMP) discovery with features validated for AMP classification (amphipathicity, cationicity, hydrophobic moment)"
  - "Profile-based features (hydrophobicity profile, hydrophobic moment profile, linker preference profile) provide per-residue resolution for identifying functional regions"
  - "No model weights to download -- a pure-Python computation, so cold starts are instant and deployment is trivial"
  - "Standard feature set widely used in published peptide ML literature (AI4AMP, structure-aware AMP classifiers), ensuring compatibility with community methods"
  - "Supports extended amino acid alphabet including ambiguous codes (B, Z, X), handling real-world sequence data with non-standard residues"

weaknesses:
  - "Computes raw physicochemical descriptors, not predictions -- requires building separate ML models on top for tasks like AMP classification, solubility prediction, or stability assessment"
  - "Some features (hydrophobic moment, instability index) were originally validated on short peptides and may have reduced biological relevance for very long proteins (>500 residues)"
  - "No evolutionary or structural information captured -- purely physicochemical properties without the contextual features that protein language models (ESM2) provide"
  - "Feature extraction only (encode action) -- no predict action for any specific biological property"
  - "Amino acid composition-based features treat each position independently, missing sequence order effects beyond the windowed profile features"
  - "Designed primarily for peptides; protein-level features like domain architecture, secondary structure, or fold type are not computed"

use_when:
  - "You are building ML models for peptide property prediction (antimicrobial activity, cell penetration, toxicity) and need a standardized physicochemical feature set as input"
  - "You need interpretable protein/peptide descriptors where every feature has a clear physical meaning for regulatory or clinical settings"
  - "You are screening large peptide libraries and need fast, cheap feature computation for filtering by physicochemical property ranges (charge, hydrophobicity, molecular weight)"
  - "You want to characterize peptide drugs by their physicochemical profile for formulation optimization (isoelectric point for pH selection, hydrophobicity for membrane interaction)"
  - "You need baseline physicochemical features to compare against learned representations (ESM2 embeddings) in ablation studies or feature importance analyses"
  - "You are performing exploratory data analysis of peptide datasets and need comprehensive descriptor computation without writing custom code"

dont_use_when:
  - "You need ready-to-use biological property predictions (toxicity, solubility, stability) rather than raw features -- use BioLMTox2, CamSol, ESMStabP, or other specialized predictors"
  - "You need protein language model embeddings that capture evolutionary and structural context -- use ESM2 for learned representations"
  - "You are working with very long proteins where physicochemical descriptors have limited biological relevance -- use ESM2 or specialized protein models"
  - "You need structure-aware features and have 3D coordinates available -- use ProDy or Biotite for structural analysis"
  - "You need to predict specific peptide properties (antimicrobial activity, cell penetration) directly -- peptides module provides features, not predictions"
  - "You need features that account for post-translational modifications -- standard amino acid-based descriptors do not capture modifications"

alternatives:
  - model: esm2
    when_better: "ESM2 provides learned embeddings that capture evolutionary relationships, structural context, and functional patterns not accessible from physicochemical properties alone; more powerful for complex downstream tasks"
    when_worse: "ESM2 embeddings are opaque high-dimensional vectors without direct physical interpretability; require GPU for the larger variants; peptides features are interpretable, cheap, and computed instantly on CPU"

complements:
  - model: esm2
    workflow: "Concatenate peptides physicochemical features with ESM2 learned embeddings to create a combined feature representation that captures both interpretable physical properties and deep contextual patterns for downstream ML models"
    example_protocol: null
