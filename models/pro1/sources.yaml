source_repos:
  - type: "github"
    url: "https://github.com/michaelhla/pro-1"
    commit: "8f488bdd4fa839ec93a152600204b1052a412c14"
    branch: "main"
    snapshot_r2: "knowledge-base/models/pro1/primary/repos/pro1-snapshot.tar.gz"
    notes: "LoRA adapter weights + inference script. Core inference in pro1_inference.py. Optional OpenAI API for LM sequence applier (not needed for core model)."

  - type: "huggingface"
    url: "https://huggingface.co/mhla/pro-1"
    page_md_r2: "knowledge-base/models/pro1/primary/pages/hf-model-page.md"
    notes: |
      LoRA checkpoints available on the HF repo:
        - best-checkpoint: 8B base GRPO
        - creativity-lm-grpo-mega-run-full/...: 8B + creativity reward (not deployed)
        - all-lm-grpo-mega-run/checkpoints/...: 8B + creativity + specificity reward (DEFAULT — pinned to step40)
        - llama_70b_4bit_sft_lora_model: 70B SFT-only (not deployed: gated base repo)
      Base models: unsloth/meta-Llama-3.1-8B-Instruct (8B) and meta-llama/Llama-3.3-70B-Instruct (70B).
      Weights are LoRA adapters loaded via unsloth.FastLanguageModel in 4-bit quantization.

# ---------------------------------------------------------------------------
# Applied Literature
# ---------------------------------------------------------------------------
# Coverage note: Pro-1 was released March 2025 as a blog post + GitHub repo
# (no arXiv preprint) and has not yet been cited by name in peer-reviewed
# literature. Only one direct Pro-1 application exists (the Adaptyv Bio wet-lab
# validation); entries 2-4 are paradigm-adjacent works (same RL+CoT or
# reasoning-LLM-for-protein-design approach) that contextualise Pro-1's
# methodology even though they do not use Pro-1 directly.
applied_literature:
  - title: "Protein Designer Spotlight: Can a language model reason about protein design? (Pro-1 wet-lab validation)"
    arxiv: ""
    doi: ""
    url: "https://www.adaptyvbio.com/blog/pro1/"
    year: 2025
    relevance: >
      Adaptyv Bio tested 19 FGF-1 sequences designed by Pro-1 in their wet lab.
      K116E single-point mutant achieved +24°C melting temperature improvement over
      wild-type while maintaining FGFR-1 binding affinity (BLI assay). Comparable
      to literature-optimized variants (Q40P, S47I, H93G, K112N). First independent
      wet-lab validation of Pro-1 outputs.
    molecule_focus: "protein"
    task_focus:
      - "stability_prediction"
      - "sequence_optimization"
    pdf_r2: "pending"
    md_r2: "knowledge-base/models/pro1/applied/blogs/adaptyvbio-pro1-spotlight.md"
    protocol_potential:
      feasibility: "high"
      models_available:
        - "pro1"
      models_missing: []
      protocol_type: "enzyme_optimization"
      market_segment: "industrial_enzymes"
      notes: >
        Self-contained single-model workflow: Pro-1 generates stability-improving
        mutations with reasoning traces. Pair with ESMFold for structure validation
        and Rosetta for in-silico scoring of proposals.

  # ---- Paradigm-adjacent entries (do NOT use Pro-1 directly; included as
  # methodology peers and to contextualise Pro-1's approach) ----

  - title: "Reasoning Models Outperform Standard Language Models in De Novo Protein Design"
    arxiv: ""
    doi: ""
    url: "https://openreview.net/forum?id=yXYEbPQp8x"
    year: 2025
    relevance: >
      Greisen et al. (Agents4Science workshop @ NeurIPS 2025) benchmark five
      ChatGPT variants on de novo four-helix bundle design and find that
      reasoning models (o3, o4-mini) reach 44% / 20% success (pLDDT > 75) while
      every standard LLM scores 0%. One designed sequence was confirmed
      α-helical by circular dichroism. Independently validates the central
      claim behind Pro-1: chain-of-thought reasoning, not raw scale, is what
      enables LLM-based protein design. Does not cite Pro-1 directly.
    molecule_focus: "protein"
    task_focus:
      - "sequence_design"
      - "reasoning_benchmarking"
    pdf_r2: "pending"
    md_r2: "pending"
    protocol_potential:
      feasibility: "medium"
      models_available:
        - "pro1"
      models_missing: []
      protocol_type: "reasoning_guided_de_novo_design"
      market_segment: "protein_engineering_research"
      notes: >
        Paradigm-validation paper, not a Pro-1 application. Useful for justifying
        Pro-1 over non-reasoning sequence models when discussing methodology.

  - title: "PepThink-R1: LLM for Interpretable Cyclic Peptide Optimization with CoT SFT and Reinforcement Learning"
    arxiv: "2508.14765"
    doi: ""
    url: "https://arxiv.org/abs/2508.14765"
    year: 2025
    relevance: >
      Wang et al. (Merck, NeurIPS 2025) apply the same training recipe as Pro-1
      — chain-of-thought SFT followed by RL with a physics/property reward —
      to cyclic peptide optimisation for lipophilicity, stability, and oral
      exposure. They explicitly demonstrate that adding CoT to the RL loop
      improves property control beyond RL alone, confirming Pro-1's GRPO+CoT
      design philosophy generalises across molecule classes. Does not cite
      Pro-1, but is the most rigorous published peer of Pro-1's methodology.
    molecule_focus: "peptide"
    task_focus:
      - "sequence_optimization"
      - "stability_engineering"
      - "interpretable_design"
    pdf_r2: "pending"
    md_r2: "pending"
    protocol_potential:
      feasibility: "medium"
      models_available:
        - "pro1"
      models_missing: []
      protocol_type: "rl_cot_property_optimization"
      market_segment: "therapeutic_peptides"
      notes: >
        Methodology peer. Useful as a peer-reviewed reference when citing
        Pro-1's GRPO+CoT approach.

  - title: "Designer Spotlight: ProtRL — Reinforcement Learning and the Move 37 of Protein Engineering"
    arxiv: ""
    doi: ""
    url: "https://www.adaptyvbio.com/blog/protrl/"
    year: 2025
    relevance: >
      Adaptyv Bio's July 2025 spotlight on ProtRL documents the first closed-loop
      experimental validation of GRPO/DPO applied to protein language models
      for binder design (45% wet-lab hit rate for EGFR binders, top Kd 27.4 nM).
      Different task (binder design vs stability) but same RL-on-protein-LLM
      paradigm and the same wet-lab partner that validated Pro-1 designs.
      Provides a directly comparable wet-lab benchmark for the paradigm.
    molecule_focus: "protein"
    task_focus:
      - "binder_design"
      - "reinforcement_learning"
      - "wet_lab_validation"
    pdf_r2: "pending"
    md_r2: "pending"
    protocol_potential:
      feasibility: "high"
      models_available:
        - "pro1"
      models_missing: []
      protocol_type: "rl_guided_protein_engineering"
      market_segment: "protein_engineering_research"
      notes: >
        Paired well with the Pro-1 Adaptyv spotlight to frame the broader
        Adaptyv Foundry → RL-trained protein LLM closed-loop pattern.
