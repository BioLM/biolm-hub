model_slug: "propermab"
display_name: "ProperMAB"
last_updated: "2026-03-17"

strengths:
  - "Comprehensive 34-feature developability profile covering hydrophobic patches, charge distribution, surface electrostatics, aromatic clustering, dipole moment, and spatial point pattern statistics -- far exceeding simpler tools like TAP (5 features) or SCM (1 feature)"
  - "Validated HIC retention time prediction achieving Pearson r=0.71 on 135 clinical-stage antibodies from the Jain et al. PNAS benchmark, the most widely used developability evaluation dataset"
  - "Novel spatial statistics features (ANN index, Ripley's K) borrowed from geographic information science, capturing surface property clustering patterns that simple aggregate statistics miss"
  - "Isotype-aware analysis with explicit support for IgG1, IgG2, and IgG4 isotypes and kappa/lambda light chain types, accounting for isotype-specific biophysical behavior"
  - "Integrated structure prediction pipeline using ABodyBuilder2 internally, so users provide only sequences and receive structure-derived features without managing separate structure prediction steps"
  - "Published demonstration that the widely cited SCM score is NOT predictive for IgG4 viscosity (rho=0.12), providing evidence-based guidance for choosing the right features for viscosity prediction"
  - "Features serve as interpretable inputs to downstream ML models, allowing users to understand which biophysical properties drive predicted developability outcomes"

weaknesses:
  - "Extracts features, not direct property predictions -- users must train their own ML models on top of ProperMAB features combined with experimental measurements for specific properties of interest"
  - "CPU-intensive pipeline requiring 8 CPUs, 32 GB RAM, and up to 15 minutes per request due to ABodyBuilder2 structure prediction, NanoShaper meshing, APBS electrostatics, and FreeSASA calculations"
  - "Requires paired heavy and light chain sequences; cannot process nanobodies (VHH) or single-chain antibody fragments"
  - "No GPU acceleration available; the computational cost limits throughput to tens or hundreds of antibodies rather than the thousands that sequence-only models can handle"
  - "Recent publication (2025) with no applied literature yet; features have not been independently validated by external groups"
  - "Depends on ABodyBuilder2 structure prediction accuracy; errors in predicted structures propagate into structure-derived features, with ~5% performance drop compared to using experimental structures"
  - "Not validated for bispecific antibodies; each arm would need separate feature extraction, and inter-Fv interactions are not captured"

use_when:
  - "You need comprehensive biophysical feature profiling for a panel of antibody candidates and want interpretable features for downstream ML model training on experimental developability data"
  - "You are building a custom developability prediction model and need a standardized set of 34 features covering hydrophobicity, charge, electrostatics, and surface topology"
  - "You want to predict HIC retention time (surface hydrophobicity proxy) using validated multi-feature models and need the strongest available feature set for this property"
  - "You need to analyze high-concentration viscosity risk for IgG4 antibodies and want features (dipole moment, charge asymmetry) that are actually predictive -- unlike SCM"
  - "You are performing lead optimization and want to understand which surface properties contribute to a candidate's poor developability, using interpretable feature decomposition"
  - "You want structure-derived biophysical features without managing a separate structure prediction and feature extraction pipeline -- ProperMAB integrates everything"

dont_use_when:
  - "You need rapid screening of thousands of antibody sequences and cannot afford 15 minutes per candidate -- use AbLEF for instant sequence-level HIC-RT and Fab Tm predictions"
  - "You need direct property predictions (not features) and do not have experimental data to train downstream ML models -- use AbLEF for HIC-RT and Fab Tm, or CamSol for solubility"
  - "You are working with nanobody (VHH) or single-chain sequences -- ProperMAB requires paired VH/VL input"
  - "You need general protein developability assessment for non-antibody proteins -- use CamSol for solubility or ESMStabP for thermal stability"
  - "You need sequence-level antibody analysis (embeddings, scoring, generation) -- use AbLang2, IgBERT, or IgT5 for language model-based analysis"
  - "You need antibody structure prediction as a standalone output -- use AbodyBuilder3 or ImmuneFold; ProperMAB uses structure internally but outputs features, not structures"
  - "You are in early discovery with thousands of candidates and need to narrow to a manageable shortlist -- use faster sequence-only models first, then apply ProperMAB to the shortlist"

alternatives:
  - model: "ablef"
    when_better: "AbLEF provides instant sequence-level predictions of HIC-RT and Fab Tm without structure computation, enabling rapid screening of large candidate panels in seconds rather than minutes"
    when_worse: "AbLEF predicts only 2 properties with a small training set and no structural features; ProperMAB extracts 34 interpretable features with validated correlations to multiple developability dimensions"
  - model: "ablang2"
    when_better: "AbLang2 provides fast germline-debiased antibody embeddings with four actions (encode, predict, generate, predict_log_prob) for general-purpose sequence analysis on CPU"
    when_worse: "AbLang2 produces general embeddings, not interpretable biophysical features; ProperMAB's features have direct physical meaning (hydrophobic patch area, dipole moment) enabling mechanistic interpretation"
  - model: "esm2"
    when_better: "ESM-2 covers all proteins with fast inference and the broadest ecosystem; useful for general protein embeddings when antibody-specific biophysical features are not needed"
    when_worse: "ESM-2 embeddings are opaque numerical representations without interpretable biophysical meaning; ProperMAB features are physically grounded and validated against experimental measurements"
  - model: "mpnn"
    when_better: "ProteinMPNN designs sequences given protein structures, addressing a complementary task; useful for designing variants that ProperMAB can then characterize"
    when_worse: "ProteinMPNN is a sequence design tool, not a developability assessment tool; it cannot extract or predict biophysical features related to antibody manufacturability"

complements:
  - model: "ablef"
    workflow: "Use AbLEF for fast initial triage of large antibody panels by HIC-RT and Fab Tm, then run ProperMAB on the shortlisted candidates (tens to hundreds) for comprehensive 34-feature developability profiling"
    example_protocol: null
  - model: "immunefold"
    workflow: "Use ImmuneFold for highest-accuracy Fv structure prediction (replacing ProperMAB's internal ABodyBuilder2), then extract ProperMAB features from the ImmuneFold-predicted structures for improved feature accuracy"
    example_protocol: null
  - model: "antifold"
    workflow: "Use AntiFold to design CDR variant sequences conditioned on a known antibody structure, then run ProperMAB on the designed variants to assess which ones have favorable biophysical feature profiles"
    example_protocol: null
  - model: "abodybuilder3"
    workflow: "Use AbodyBuilder3 (language variant) for potentially more accurate Fv structure prediction than ProperMAB's internal ABodyBuilder2, then feed those structures into a ProperMAB-style feature extraction pipeline"
    example_protocol: null
