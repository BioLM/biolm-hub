  md_r2: pending
- title: Accurate de novo design of high-affinity protein-binding macrocycles using deep learning
  doi: 10.1038/s41589-025-01929-w
  year: 2025
  relevance: Introduces RFpeptides, extending RFdiffusion for macrocyclic peptide binder design; testing fewer than 20 designs
    per target yields medium-to-high-affinity binders against all 4 targets, with one achieving Kd<10 nM and X-ray structures
    matching designs within 1.5 A RMSD.
  molecule_focus: peptide
  task_focus: binder_design
  pdf_r2: pending
  md_r2: pending
- title: One-shot design of functional protein binders with BindCraft
  doi: 10.1038/s41586-025-09429-6
  year: 2025
  relevance: Benchmarks BindCraft against the RFdiffusion+ProteinMPNN pipeline on diverse binder design targets; BindCraft
    achieves 10-100% experimental success rates (avg 46%) on 12 targets including Cas9, providing direct comparison of RFdiffusion
    backbone generation vs AF2-based iterative design.
