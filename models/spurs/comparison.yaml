model_slug: spurs
display_name: SPURS
last_updated: "2026-03-17"

strengths:
  - "Multi-mutation ddG prediction with per-mutation contributions, capturing pairwise epistatic effects that simple additive models miss -- critical for combinatorial protein engineering"
  - "Full deep mutational scanning (DMS) matrix generation (L positions x 20 amino acids) in seconds, computationally replicating experiments that cost $50K-$500K"
  - "Hybrid ESM2-650M + GNN architecture combines evolutionary sequence features with structural context for comprehensive stability assessment"
  - "Published in Nature Communications (2025), demonstrating generalizable and scalable stability prediction with rigorous benchmarking"
  - "Variant sequence comparison mode automatically identifies all mutations between wild-type and variant sequences and predicts combined ddG"
  - "Supports both specific mutation lists and automatic full-DMS scanning in a single predict action, enabling flexible use from targeted queries to comprehensive landscapes"
  - "T4 GPU requirement (16 GB RAM) provides a good balance of accuracy and cost for structure-based stability prediction"

weaknesses:
  - "Requires both sequence and 3D structure as input -- cannot predict stability from sequence alone; use ESM2 log-likelihoods or TemBERTure when no structure is available"
  - "Very recent model (published 2025) with no applied literature citations yet -- independent validation is limited"
  - "T4 GPU with 16 GB RAM required -- more resource-intensive than CPU-only alternatives like GEMME for evolutionary variant scoring"
  - "Training data may under-represent membrane proteins and intrinsically disordered regions, potentially reducing accuracy on these protein types"
  - "ddG predictions are approximate -- not a replacement for physics-based methods (Rosetta, FoldX) when high-precision energetics are needed for a specific target"
  - "Single-chain proteins only; multi-chain complex stability and interface mutations require separate treatment"
  - "No uncertainty quantification on individual ddG predictions -- the model does not provide confidence intervals"

use_when:
  - "You have a 3D structure and need fast, accurate ddG predictions for single or multiple simultaneous mutations with epistatic effects captured"
  - "You want a complete computational DMS matrix covering all possible single-residue substitutions to guide a directed evolution or rational design campaign"
  - "You are comparing wild-type and engineered variant sequences and want to quantify the predicted stability difference in kcal/mol"
  - "You need multi-mutation stability prediction that goes beyond additive approximations to capture synergistic or antagonistic epistatic effects"
  - "You are filtering large mutation libraries to exclude destabilizing variants before experimental screening, saving time and reagent costs"
  - "You want to integrate stability prediction into an automated protein design pipeline alongside structure prediction (Boltz) and sequence design (ProteinMPNN)"

dont_use_when:
  - "You do not have a 3D structure and cannot generate one -- use GEMME (MSA-based) or ESM2 pseudo-log-likelihoods for sequence-only variant scoring"
  - "You need high-precision physics-based ddG values for a single critical mutation -- use FoldX or Rosetta ddG protocols for individual high-stakes predictions"
  - "You need global protein melting temperature (Tm) rather than per-mutation ddG -- use ESMStabP or TemBERTure"
  - "You need variant effect prediction driven purely by evolutionary conservation signals -- use GEMME for MSA-based scoring that captures evolutionary constraint without structural bias"
  - "You are working with intrinsically disordered proteins that lack a stable reference structure for ddG calculation"
  - "You need CPU-only inference for cost-sensitive large-scale screening -- GEMME runs on CPU in under 10 minutes"

alternatives:
  - model: thermompnn
    when_better: "ThermoMPNN is lighter-weight (8 GB RAM) with a longer publication track record for single-mutation ddG and a peer-reviewed PNAS publication; simpler model when only single mutations are needed"
    when_worse: "ThermoMPNN cannot predict multi-mutation ddG or generate full DMS matrices; strictly single-point mutations only"
  - model: thermompnn_d
    when_better: "ThermoMPNN-D provides an explicit epistatic interaction mode specifically designed and benchmarked for pairwise double mutations"
    when_worse: "ThermoMPNN-D is limited to exactly two mutations; SPURS handles arbitrary numbers of simultaneous mutations and provides per-mutation contribution decomposition"
  - model: gemme
    when_better: "GEMME requires only an MSA (no structure), runs on CPU in minutes, and captures evolutionary constraint signals that structure-based models may miss; best for proteins with deep evolutionary history"
    when_worse: "GEMME predicts relative fitness rather than thermodynamic ddG in kcal/mol; no structural context; no multi-mutation epistasis modeling"
  - model: esmstabp
    when_better: "ESMStabP predicts absolute melting temperature (Tm) from sequence alone with R-squared 0.94, providing a different stability metric without structure requirement"
    when_worse: "ESMStabP predicts global Tm, not per-mutation ddG; cannot identify specific stabilizing mutations or generate DMS landscapes"
  - model: temberture
    when_better: "TemBERTure provides sequence-only thermostability classification and Tm prediction with thermostability-aware embeddings; no structure required"
    when_worse: "TemBERTure provides global classification/regression only; no per-mutation resolution, no DMS matrix, no epistasis modeling"

complements:
  - model: boltz
    workflow: "Predict 3D structure with Boltz for proteins without experimental structures, then use SPURS for comprehensive stability analysis including full DMS matrix and multi-mutation ddG predictions"
    example_protocol: null
  - model: esm2
    workflow: "Use ESM2 log_prob for fast sequence-based mutation screening to identify evolutionarily plausible mutations, then validate with SPURS structure-based ddG for a two-layer stability assessment"
    example_protocol: null
  - model: gemme
    workflow: "Use GEMME for MSA-based evolutionary variant scoring to capture conservation-driven constraints, then use SPURS for structure-based ddG prediction -- combining evolutionary and structural evidence for higher-confidence mutation prioritization"
    example_protocol: null
  - model: pro4s
    workflow: "Use SPURS to identify stabilizing mutations, then use Pro4S to verify that the stabilized variants maintain acceptable expression solubility -- ensuring both stability and expressibility are optimized"
    example_protocol: null
