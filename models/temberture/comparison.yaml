    workflow: "Use TemBERTure classifier for rapid thermostability screening of protein libraries, then run ThermoMPNN on the structures of promising thermophilic candidates to identify further stabilizing mutations via per-position ddG scanning"
    example_protocol: null
  - model: camsol
    workflow: "Use TemBERTure to assess thermostability and CamSol to assess solubility -- screening protein candidates for both thermal stability and aggregation propensity provides a more complete developability profile"
    example_protocol: null
  - model: esm2
    workflow: "Combine TemBERTure's thermostability-aware embeddings with ESM2's general-purpose protein embeddings as complementary feature sets for custom downstream stability prediction models"
    example_protocol: null
  - model: boltz
    workflow: "Use TemBERTure to classify proteins as thermophilic/non-thermophilic, then predict structures of thermostable candidates with Boltz for structural analysis of thermostability determinants"
    example_protocol: null
