  - Mingyang Ni
  - Olga Predeina
  - Ronan Gaffey
  - Philipp Kunz
  - Sile Onuoha
  - Pietro Sormanni
  relevance: 'NanoMelt directly benchmarks against TEMPRO for nanobody Tm prediction. Trained on 640 nanobodies using ESM-1b
    + SVR, achieving Pearson 0.751 on external test (83 samples) vs TEMPRO''s R2=0.67 on 6-sample external set. Validates
    TEMPRO''s problem formulation while extending the dataset.

    '
