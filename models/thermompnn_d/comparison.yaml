    workflow: "Use ThermoMPNN for fast single-mutation SSM scanning to identify the most promising stabilizing positions, then use ThermoMPNN-D to evaluate all pairwise combinations among the top candidates for epistatic synergies"
    example_protocol: null
  - model: boltz
    workflow: "Predict 3D structure with Boltz when no experimental structure exists, then use ThermoMPNN-D to scan for synergistic double-mutation stability improvements on the predicted structure"
    example_protocol: null
